<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glog</title>
    <link rel="stylesheet" href="assets/styles/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.7.2/css/all.min.css">
</head>

<body>

    <div class="wrapper">
        <!-- --Left panel-- -->
        <section class="register">
            <div class="logo">
                <i class="fa fa-layer-group"></i>
                Glog UI
            </div>
            <FORM action="javascript:void(0)">
                <div class="input-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" placeholder="Farzad Asgari" name="fullname" id="fullname">
                </div>
                <div class="input-group">
                    <label for="email">Email Adress</label>
                    <input type="email" placeholder="khufarzadasgari@gmail.com" name="mail" id="mail">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" placeholder="******" name="password" id="password">
                </div>
                <div class="option">
                    <label for="terms" class="remember">
                        <input type="checkbox" name="terms" id="terms">
                        I agree to Terms
                    </label>
                </div>
                <button class="register-btn">
                    Creat an account
                </button>
            </FORM>
            <div class="divider">
                <span>or continue with</span>
            </div>
            <div class="socials">
                <button>
                    <i class="fa-brands fa-google"></i>
                    Google
                </button>
                <button>
                    <i class="fa-brands fa-orcid"></i>
                    ORCID
                </button>
                <button>
                    <i class="fa-brands fa-yahoo"></i>
                    Yahoo
                </button>
            </div>
            <p class="Login-link">
                Already have an account?
                <a href="javascript:void(0)">Sign-in</a>
            </p>
        </section>
        <section class="gallery">
        <!-- --right panel-- -->
        <div class="card card1">
            <img src="assets/image/istockphoto-1299996685-612x612-ezgif.com-jpg-to-webp-converter.webp" alt="">
        </div>
        <div class="card card2">
            <img src="assets/image/istockphoto-1495819409-612x612-ezgif.com-jpg-to-webp-converter.webp" alt="">
        </div>
        <div class="card card3">
            <img src="assets/image/istockphoto-2151108488-612x612-ezgif.com-jpg-to-webp-converter.webp" alt="">
        </div>
        <div class="card card4">
            <img src="assets/image/istockphoto-2161617920-612x612-ezgif.com-jpg-to-webp-converter.webp" alt="">
        </div>
        <div class="card card5">
            <img src="assets/image/Neural_Networks_2880x1620-2880x1620-ezgif.com-resize.webp" alt="">
        </div>
        </section>
    </div>

</body>

</html>
